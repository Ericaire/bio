<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 340" role="img" aria-labelledby="title desc">
  <title id="title">InstantViR++ concept thumbnail</title>
  <desc id="desc">Three distillation gaps are bridged by CAI, BDC, and CLA for real-time video inverse problem solving.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3f6ff"/>
      <stop offset="100%" stop-color="#edfdf4"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eff3ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#223055" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="460" height="340" rx="28" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="42" y="56" width="112" height="88" rx="20" fill="url(#card)"/>
    <text x="98" y="91" text-anchor="middle" fill="#355cff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900">CAI</text>
    <text x="98" y="117" text-anchor="middle" fill="#5d687a" font-family="Inter, Arial, sans-serif" font-size="12">causal init</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="174" y="56" width="112" height="88" rx="20" fill="url(#card)"/>
    <text x="230" y="91" text-anchor="middle" fill="#355cff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900">BDC</text>
    <text x="230" y="117" text-anchor="middle" fill="#5d687a" font-family="Inter, Arial, sans-serif" font-size="12">bridge latents</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="306" y="56" width="112" height="88" rx="20" fill="url(#card)"/>
    <text x="362" y="91" text-anchor="middle" fill="#355cff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900">CLA</text>
    <text x="362" y="117" text-anchor="middle" fill="#5d687a" font-family="Inter, Arial, sans-serif" font-size="12">cyclic weights</text>
  </g>
  <path d="M98 160v32c0 22 18 40 40 40h184c22 0 40-18 40-40v-32" fill="none" stroke="#8da0d5" stroke-width="6" stroke-linecap="round"/>
  <g filter="url(#shadow)">
    <rect x="86" y="206" width="288" height="74" rx="22" fill="#17233f"/>
    <text x="230" y="238" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">InstantViR++</text>
    <text x="230" y="260" text-anchor="middle" fill="#cbd6ff" font-family="Inter, Arial, sans-serif" font-size="13">bridged posterior distillation</text>
  </g>
  <circle cx="98" cy="160" r="7" fill="#355cff"/>
  <circle cx="230" cy="160" r="7" fill="#355cff"/>
  <circle cx="362" cy="160" r="7" fill="#355cff"/>
  <text x="44" y="310" fill="#162033" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">4x fewer DiT tokens</text>
  <text x="44" y="330" fill="#5d687a" font-family="Inter, Arial, sans-serif" font-size="13">33.5 FPS with compressed DA-VAE latents</text>
</svg>
